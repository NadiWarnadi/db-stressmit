name: Dynamic Payload Auto-Update

on:
  schedule:
    - cron: '0 0 * * *' # Berjalan setiap hari pada jam 12 malam UTC
  workflow_dispatch: # Memungkinkan eksekusi manual via tombol di GitHub UI

jobs:
  update-payloads:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none

      - name: Compile Latest OSV Patterns
        run: php scripts/compile_patterns.php

      - name: Run Tests to Verify Integrity
        run: |
          if [ -f vendor/bin/phpunit ]; then
            vendor/bin/phpunit
          else
            echo "PHPUnit belum terinstall, melewati tahap pengujian."
          fi

      - name: Commit and Push if Changes Detected
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add src/Patterns/compiled.php
          
          # Cek apakah ada perubahan yang perlu dicommit
          if git diff --staged --quiet; then
            echo "Tidak ada pola payload baru yang ditemukan hari ini."
          else
            git commit -m "chore(security): auto-update dynamic exploit payloads from OSV [skip ci]"
            git push origin main
          fi