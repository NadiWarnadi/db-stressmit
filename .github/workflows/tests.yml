name: Continuous Integration

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: [ '8.1', '8.2', '8.3', '8.4']

    name: PHP ${{ matrix.php-version }} Test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, json, pdo, pdo_mysql
          coverage: none

      - name: Install dependencies via Packagist
        run: |
          # Melonggarkan strict check di level CI agar platform silang tidak memicu exit code 2
          composer validate
          composer install --prefer-dist --no-progress --ignore-platform-reqs

      - name: Validate CLI Executable
        run: php bin/db-stressmit --help

      # --- LANGKAH BARU UNTUK COMMIT AMAN ATAS NAMA ANDA ---
      - name: Commit and Push Changes Safely
        run: |
          # Konfigurasi Git menggunakan email samaran resmi GitHub Anda
          git config --local user.email "${{ github.actor_id }}+${{ github.actor }}@://github.com"
          git config --local user.name "${{ github.actor }}"
          
          # Memeriksa apakah ada berkas yang berubah selama proses pengujian/build
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: automated updates from CI pipeline [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "Tidak ada perubahan berkas, melewati proses commit."
          fi
