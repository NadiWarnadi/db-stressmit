name: "Security Scan PHP (Psalm)"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 0 * * 1' # Berjalan otomatis seminggu sekali tiap hari Senin

permissions:
  security-events: write # Wajib untuk mengunggah hasil scan keamanan ke GitHub
  issues: write           # Wajib agar Actions bisa membuat Issue otomatis

jobs:
  psalm-scan:
    name: PHP Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repositori
      uses: actions/checkout@v4

    # Menjalankan pemindaian keamanan khusus kode PHP menggunakan Psalm
    - name: Jalankan Psalm Security Scan
      uses: docker://ghcr.io/vimeo/psalm-github-actions:latest
      with:
        security_analysis: true
        report_format: sarif

    # Membuat Issue otomatis jika dari hasil scan di atas ditemukan celah bahaya
    - name: Buat Issue Otomatis Jika Ada Temuan
      if: always() # Tetap berjalan untuk mengecek apakah ada file laporan keamanan
      uses: actions/github-script@v7
      with:
        script: |
          try {
            // Mengambil data alert scanning keamanan terbaru dari repositori ini
            const alerts = await github.rest.codeScanning.listAlertsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            
            // Menyaring celah keamanan yang aktif
            const openAlerts = alerts.data.filter(alert => alert.state === 'open');

            if (openAlerts.length > 0) {
              // Cari tahu apakah issue serupa sudah pernah dibuat agar tidak duplikat
              const existingIssues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: ['security-alert']
              });

              if (existingIssues.data.length === 0) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: '⚠️ Temuan Keamanan: Celah PHP Terdeteksi di Code Review',
                  labels: ['security-alert'],
                  body: `Halo Tim,\n\nGitHub Actions (Psalm Scanner) mendeteksi adanya **${openAlerts.length} celah keamanan baru** pada kode PHP Anda.\n\nSilakan periksa detail lokasi baris kode dan cara memperbaikinya langsung di tab **Security > Code scanning alerts** pada repositori Anda.\n\n_Pesan ini dibuat otomatis oleh GitHub Actions._`
                });
              }
            }
          } catch (error) {
            console.log("Proses pengecekan selesai: ", error);
          }
