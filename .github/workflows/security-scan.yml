name: "Security Scan PHP Gratis"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 0 * * 1' # Berjalan otomatis seminggu sekali tiap hari Senin

permissions:
  security-events: write # Wajib untuk menjalankan CodeQL gratis di repo publik
  issues: write           # Wajib agar Actions bisa membuat Issue otomatis

jobs:
  analyze:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repositori
      uses: actions/checkout@v4

    # Menggunakan v4 terbaru agar kompatibel dengan Node 24 di GitHub Runner
    # Menggunakan format penulisan lowercase resmi untuk registrasi bahasa
    - name: Inisialisasi CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: php

    - name: Jalankan Analisis Keamanan
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:php"

    # Logika pembuatan Issue otomatis jika ditemukan celah bahaya
    - name: Buat Issue Otomatis Jika Ada Temuan
      if: always() # Tetap berjalan meskipun langkah scan mendeteksi error kode
      uses: actions/github-script@v7
      with:
        script: |
          try {
            const alerts = await github.rest.codeScanning.listAlertsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            
            // Menyaring alert tingkat tinggi/kritis khusus PHP
            const criticalAlerts = alerts.data.filter(alert => 
              alert.tool.name === 'CodeQL' && 
              (alert.rule.severity === 'error' || alert.rule.security_severity_level === 'high' || alert.rule.security_severity_level === 'critical')
            );

            if (criticalAlerts.length > 0) {
              // Cari tahu apakah issue serupa sudah pernah dibuat agar tidak spam
              const existingIssues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: ['security-alert']
              });

              if (existingIssues.data.length === 0) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: '⚠️ Temuan Keamanan: Celah Bahaya Terdeteksi di Code Review',
                  labels: ['security-alert'],
                  body: `Halo Tim,\n\nGitHub Actions mendeteksi adanya **${criticalAlerts.length} kerentanan keamanan** tingkat tinggi/kritis pada kode PHP Anda.\n\nSilakan periksa detail lokasi baris kode dan cara memperbaikinya langsung di tab **Security > Code scanning alerts** pada repositori Anda.\n\n_Pesan ini dibuat otomatis oleh GitHub Actions._`
                });
              }
            }
          } catch (error) {
            console.log("Proses pengecekan alert selesai atau dilewati: ", error);
          }
